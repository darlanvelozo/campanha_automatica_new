# Configuração Nginx para Campanha Manager
# Copie este arquivo para /etc/nginx/sites-available/campanha-manager
# Execute: sudo ln -s /etc/nginx/sites-available/campanha-manager /etc/nginx/sites-enabled/

upstream campanha_app {
    # Servidor Gunicorn
    server 127.0.0.1:8000 fail_timeout=0;
    
    # Se usar socket Unix (mais performático):
    # server unix:/run/gunicorn.sock fail_timeout=0;
}

# Redireciona www para não-www (opcional)
server {
    listen 80;
    server_name www.seu-dominio.com;
    return 301 $scheme://seu-dominio.com$request_uri;
}

# Configuração principal
server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com;  # AJUSTE AQUI: coloque seu domínio ou IP

    # Charset
    charset utf-8;

    # Tamanho máximo de upload
    client_max_body_size 10M;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65;
    send_timeout 60s;

    # Logs
    access_log /var/log/nginx/campanha-access.log;
    error_log /var/log/nginx/campanha-error.log;

    # Diretório raiz do projeto
    set $project_root /home/darlan/projetos_django/novo_envio_campanha_automatica/campanha_automatica_new/projeto_envio_campanha_automatica_matrix;

    # Arquivos estáticos
    location /static/ {
        alias $project_root/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Compressão
        gzip on;
        gzip_vary on;
        gzip_types text/css application/javascript image/svg+xml;
    }

    # Arquivos de mídia (uploads)
    location /media/ {
        alias $project_root/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Proxy para aplicação Django/Gunicorn
    location / {
        # Headers de proxy
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers de segurança
        proxy_set_header X-Content-Type-Options nosniff;
        proxy_set_header X-Frame-Options DENY;
        proxy_set_header X-XSS-Protection "1; mode=block";
        
        # Desabilita buffering para streaming
        proxy_buffering off;
        
        # Redireciona para o upstream
        proxy_pass http://campanha_app;
        proxy_redirect off;
        
        # Timeouts (aumentados para operações de campanha longas)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Proteção contra acesso a arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloqueia acesso a arquivos de backup e temporários
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

